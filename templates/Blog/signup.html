{% extends 'blog/base.html' %}
{% block title %}Signup - MyBlog{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow-lg border-0 w-100" style="max-width: 450px; border-radius: 15px; animation: fadeIn 0.7s ease-in-out;">
    
    <!-- Card Header -->
    <div class="card-header text-white text-center" style="background: linear-gradient(90deg, #007bff, #004080); border-radius: 15px 15px 0 0;">
      <h3 class="mb-0"><i class="bi bi-person-plus-fill"></i> Sign Up</h3>
      <p class="small mb-0">Create your MyBlog account</p>
    </div>

    <!-- Card Body -->
    <div class="card-body p-4">
      <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label fw-semibold"><i class="bi bi-person-fill"></i> Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold"><i class="bi bi-envelope-fill"></i> Email</label>
          <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold"><i class="bi bi-lock-fill"></i> Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2" style="border-radius: 30px; transition: all 0.3s;">
          <i class="bi bi-check-circle"></i> Sign Up
        </button>
      </form>

      <p class="mt-3 text-center small">
        Already have an account? <a href="{% url 'login' %}" class="text-primary fw-semibold">Login</a>
      </p>
    </div>
  </div>
</div>

<!-- Animations -->
<style>
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .btn-primary:hover {
    background-color: #0056b3;
    box-shadow: 0px 4px 12px rgba(0, 91, 187, 0.4);
    transform: translateY(-2px);
  }
</style>
{% endblock %}
