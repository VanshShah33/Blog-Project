{% extends 'blog/base.html' %}
{% block title %}Edit Post - MyBlog{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow-lg border-0 w-100" style="max-width: 700px; border-radius: 15px; animation: fadeIn 0.7s ease-in-out;">
    <div class="card-header text-white text-center" style="background: linear-gradient(90deg, #007bff, #004080); border-radius: 15px 15px 0 0;">
      <h3 class="mb-0"><i class="bi bi-pencil-square"></i> Edit Your Post</h3>
    </div>

    <div class="card-body p-4">
      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label fw-semibold">Title</label>
          <input type="text" name="title" value="{{ post.title }}" class="form-control" placeholder="Enter post title" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Content</label>
          <textarea name="content" rows="6" class="form-control" placeholder="Write your content here..." required>{{ post.content }}</textarea>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Change Image (optional)</label>
          <input type="file" name="image" class="form-control">
          {% if post.image %}
          <div class="mt-3">
            <p class="text-muted small mb-1">Current Image:</p>
            <img src="{{ post.image.url }}" alt="Post Image" class="img-thumbnail" style="max-height: 150px;">
          </div>
          {% endif %}
        </div>

        <div class="text-center mt-4">
          <button type="submit" class="btn btn-primary px-4 py-2" style="border-radius: 30px; transition: all 0.3s;">
            <i class="bi bi-save2"></i> Update Post
          </button>
          <a href="{% url 'user_dashboard' %}" class="btn btn-outline-secondary px-4 py-2 ms-2" style="border-radius: 30px;">
            <i class="bi bi-arrow-left-circle"></i> Cancel
          </a>
        </div>
      </form>
    </div>

    <div class="card-footer bg-light text-center text-muted" style="border-radius: 0 0 15px 15px;">
      <small><i class="bi bi-info-circle"></i> Make sure to save your changes before leaving this page.</small>
    </div>
  </div>
</div>

<!-- Animation -->
<style>
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .btn-primary:hover {
    background-color: #0056b3;
    box-shadow: 0px 4px 12px rgba(0, 91, 187, 0.4);
    transform: translateY(-2px);
  }

  .btn-outline-secondary:hover {
    background-color: #f1f1f1;
  }
</style>
{% endblock %}
