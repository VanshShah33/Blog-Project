{% extends 'blog/base.html' %}
{% block title %}Delete Post - MyBlog{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="card shadow-lg border-0 text-center" style="max-width: 600px; width: 100%; border-radius: 15px; animation: fadeIn 0.8s ease-in-out;">
    <div class="card-header text-white" style="background: linear-gradient(90deg, #dc3545, #8b0000); border-radius: 15px 15px 0 0;">
      <h4 class="mb-0"><i class="bi bi-exclamation-triangle-fill"></i> Confirm Deletion</h4>
    </div>

    <div class="card-body p-5">
      <p class="fs-5 mb-4">
        Are you sure you want to delete this post?<br>
        <strong>"{{ post.title }}"</strong>
      </p>

      <form method="POST">
        {% csrf_token %}
        <div class="d-flex justify-content-center gap-3">
          <button type="submit" class="btn btn-danger px-4 py-2" style="border-radius: 30px; transition: all 0.3s ease;">
            <i class="bi bi-trash"></i> Yes, Delete
          </button>
          <a href="{% url 'user_dashboard' %}" class="btn btn-outline-secondary px-4 py-2" style="border-radius: 30px; transition: all 0.3s ease;">
            <i class="bi bi-arrow-left-circle"></i> Cancel
          </a>
        </div>
      </form>
    </div>

    <div class="card-footer bg-light text-muted" style="border-radius: 0 0 15px 15px;">
      <small><i class="bi bi-info-circle"></i> This action cannot be undone.</small>
    </div>
  </div>
</div>

<!-- Custom Animation -->
<style>
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .btn-danger:hover {
    transform: translateY(-2px);
    box-shadow: 0px 4px 12px rgba(220, 53, 69, 0.4);
  }

  .btn-outline-secondary:hover {
    background-color: #e3f2fd;
    color: #003366;
  }
</style>
{% endblock %}
