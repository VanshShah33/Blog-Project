{% extends 'blog/base.html' %}
{% block title %}Add New Post - MyBlog{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-lg border-0" style="border-radius: 15px; animation: fadeIn 0.8s ease-in-out;">
        <div class="card-header text-white text-center" style="background: linear-gradient(90deg, #00509e, #003366); border-radius: 15px 15px 0 0;">
          <h4 class="mb-0"><i class="bi bi-pencil-square"></i> Add a New Blog Post</h4>
        </div>

        <div class="card-body p-4">
          <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold"><i class="bi bi-type"></i> Title</label>
              <input type="text" name="title" class="form-control" placeholder="Enter post title..." required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold"><i class="bi bi-card-text"></i> Content</label>
              <textarea name="content" class="form-control" rows="6" placeholder="Write your thoughts here..." required></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold"><i class="bi bi-image"></i> Image (optional)</label>
              <input type="file" name="image" class="form-control">
            </div>

            <div class="text-center mt-4">
              <button type="submit" class="btn btn-success px-4 py-2" style="border-radius: 30px; transition: all 0.3s;">
                <i class="bi bi-upload"></i> Publish Post
              </button>
              <a href="{% url 'user_dashboard' %}" class="btn btn-outline-secondary px-4 py-2 ms-2" style="border-radius: 30px;">
                <i class="bi bi-arrow-left-circle"></i> Cancel
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Custom Animation -->
<style>
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .btn-success:hover {
    transform: translateY(-2px);
    box-shadow: 0px 4px 12px rgba(0, 128, 0, 0.3);
  }

  .btn-outline-secondary:hover {
    background: #e3f2fd;
    color: #003366;
  }
</style>
{% endblock %}
